<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flex Time BD - Premium Gadgets</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
    }

    header {
      background: #000;
      color: #fff;
      padding: 20px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .banner {
      text-align: center;
      padding: 40px 20px;
      background: linear-gradient(135deg, #000, #333);
      color: white;
    }

    .banner h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .banner p {
      font-size: 16px;
      opacity: 0.8;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card h3 {
      margin: 10px 0;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: #25D366;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #000;
      color: white;
      margin-top: 20px;
    }

  </style>
</head>

<body>

<header>
  Flex Time BD - Premium Gadgets
</header>

<div class="banner">
  <h1>Latest Smart Gadgets</h1>
  <p>Best Smart Watches & Headphones in Bangladesh</p>
</div>

<div class="products">

  <div class="card">
    <h3>Smart Watch X10</h3>
    <p class="price">৳1,299</p>
    <a class="btn" href="https://wa.me/8801980976522" target="_blank">Order on WhatsApp</a>
  </div>

  <div class="card">
    <h3>KW68 Smart Watch</h3>
    <p class="price">৳1,499</p>
    <a class="btn" href="https://wa.me/8801980976522" target="_blank">Order on WhatsApp</a>
  </div>

  <div class="card">
    <h3>P9 Headphone</h3>
    <p class="price">৳850</p>
    <a class="btn" href="https://wa.me/8801980976522" target="_blank">Order on WhatsApp</a>
  </div>

</div>

<footer>
  © 2026 Flex Time BD | All Rights Reserved
</footer>

</body>
</html>
